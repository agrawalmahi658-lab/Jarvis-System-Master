kind = "web"
previewPath = "/"
title = "JARVIIS — AI OS"
version = "1.0.0"
id = "artifacts/jarviis"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22028

[services.development]
run = "pnpm --filter @workspace/jarviis run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jarviis", "run", "build" ]
publicDir = "artifacts/jarviis/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22028"
BASE_PATH = "/"
